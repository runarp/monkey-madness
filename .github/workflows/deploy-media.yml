# One workflow: on push to main, SSH to the media VM and run the gp-ops install script.
# Requires the media host reachable from the runner (e.g. self-hosted runner on tailnet, or
# Tailscale SSH / VPN). No GitHub "webhooks" on the repo — only this workflow + Actions secrets.
#
# Secrets (repo Settings → Secrets → Actions):
#   MEDIA_SSH_HOST     e.g. media.heron-bull.ts.net
#   MEDIA_SSH_USER     e.g. ubuntu (must be in the docker group on the VM)
#   MEDIA_SSH_KEY      private key PEM for that user
#
# The GitHub-hosted runner must reach MEDIA_SSH_HOST (use a self-hosted runner on your tailnet,
# or only rely on the systemd timer in gp-ops — no GitHub integration required).
#
# One-time on media (from gp-ops):
#   ansible-playbook ... playbooks/servers/media-monkey-madness-autodeploy.yml --limit media

name: Deploy to media VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MEDIA_SSH_HOST }}
          username: ${{ secrets.MEDIA_SSH_USER }}
          key: ${{ secrets.MEDIA_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            /usr/local/sbin/deploy-monkey-madness-media.sh
